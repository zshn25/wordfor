name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minification tools
        run: pip install rjsmin rcssmin htmlmin

      - name: Minify JS, CSS, HTML
        shell: bash
        run: |
          if [ -f "minify.py" ]; then
            python minify.py
          else
            echo "minify.py not found (build is a separate repo). Skipping minification."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
          # .gitignore already excludes build/, and upload-pages-artifact
          # respects .gitignore by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  purge-cloudflare:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    # Purge on: [purge] in commit msg, or any data/ file changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[purge]')
    steps:
      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Cloudflare secrets not set, skipping cache purge"
            exit 0
          fi
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
